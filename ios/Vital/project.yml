name: Vital
options:
  bundleIdPrefix: com.simantstha
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5"

targets:
  Vital:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    dependencies:
      - sdk: HealthKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simantstha.vital
        PRODUCT_NAME: Vital
        SWIFT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_ENTITLEMENTS: Sources/App/Vital.entitlements
        # Version + build number. Local dev keeps these defaults; the
        # TestFlight pipeline (.github/workflows/release.yml → fastlane beta)
        # overrides both at archive time via xcargs: MARKETING_VERSION comes
        # from the git tag (v1.2.0 → 1.2.0) and CURRENT_PROJECT_VERSION is the
        # next TestFlight build number. apple-generic versioning is required
        # for that override to propagate into the Info.plist.
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        VERSIONING_SYSTEM: apple-generic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Entitlements live in Sources/App/Vital.entitlements:
        #   - com.apple.developer.healthkit + background-delivery (ongoing
        #     background HealthKit sync via HealthSyncCoordinator)
        #   - com.apple.developer.applesignin (Sign in with Apple; button
        #     enabled in SignInView.swift). Requires the SIWA capability on the
        #     App ID in the Apple Developer portal + APPLE_BUNDLE_ID on the
        #     backend — see docs/CI-TESTFLIGHT.md.
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Vital
        # Reference the build settings so the pipeline's xcargs override flows
        # through to the packaged Info.plist (App Store Connect reads these).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Required by App Store validation for asset-catalog app icons.
        CFBundleIconName: AppIcon
        # App uses only standard/exempt encryption (HTTPS) — declare it so
        # TestFlight doesn't gate every build on the export-compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIBackgroundModes:
          - remote-notification
        VitalAPNSEnvironment: "$(APS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "Vital reads your health data to coach you."
        NSHealthUpdateUsageDescription: "Vital may write health data on your behalf."
        NSCameraUsageDescription: "Vital uses the camera to scan barcodes and identify food."
        NSMicrophoneUsageDescription: "Vital uses the microphone so you can talk to your coach and log foods by voice."
        NSSpeechRecognitionUsageDescription: "Vital transcribes your voice to chat with your coach and search for foods."
        NSPhotoLibraryUsageDescription: "Vital accesses your photo library to identify food from images."
        NSCalendarsFullAccessUsageDescription: "Vital shows today's events in your plan and shares your upcoming events (titles and times only) with your coach so it can plan around your day."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  VitalTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests
    dependencies:
      - target: Vital
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simantstha.vital.tests
        SWIFT_VERSION: "5"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Vital:
    build:
      targets:
        Vital: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VitalTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
