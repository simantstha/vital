name: Vital
options:
  bundleIdPrefix: com.simantstha
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5"

targets:
  Vital:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    dependencies:
      - sdk: HealthKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simantstha.vital
        PRODUCT_NAME: Vital
        SWIFT_VERSION: "5"
        ENABLE_PREVIEWS: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_ENTITLEMENTS: Sources/App/Vital.entitlements
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Vital
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "Vital reads your health data to coach you."
        NSHealthUpdateUsageDescription: "Vital may write health data on your behalf."

schemes:
  Vital:
    build:
      targets:
        Vital: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
